<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agendamento Barbearia</title>

    <link rel="stylesheet" href="css/style.css">

             <!-- conectar border com css -->

</head>
<body>

    <h1>Barbearia Estilo</h1>

    <h2>Agendar Horário</h2>

    <form>
        <label>Nome:</label><br>
        <input type="text" name="nome" required><br><br>

        <label>Telefone:</label><br>
        <input type="tel" name="telefone" required><br><br>

        <label>Serviço:</label><br>
        <select name="servico">
            <option>Corte de Cabelo</option>
            <option>Barba</option>
            <option>Corte + Barba</option>
        </select><br><br>

        <label>Data:</label><br>
        <input type="date" name="data" required><br><br>

        <label>Horário:</label><br>
        <input type="time" name="hora" required><br><br>

        <button type="submit">Agendar</button>
    </form>

    <hr>

    <h2>Agendamentos</h2>

    <table>
        <tr>
            <th>Nome</th>
            <th>Serviço</th>
            <th>Data</th>
            <th>Hora</th>
        </tr>
        <tr>
            <td>João</td>
            <td>Corte</td>
            <td>10/04</td>
            <td>14:00</td>
        </tr>
    </table>

</body>
</html>
